<section class="filters-bar">
  <div class="filter-group search-input">
    <label for="search">Buscar tarea:</label>
    <input
      type="text"
      id="search"
      [value]="searchTerm()"
      placeholder="Buscar por titulo o descripción..."
      (input)="onSearchKeyup($event)"
    />
  </div>
  <div class="filter-group">
    <label for="status">Estado:</label>
    <select [value]="selectedStatus() || ''" id="status" (change)="onStatusChange($event)">
      <option value="">Todos</option>
      <option value="TODO">Pendiente</option>
      <option value="IN_PROGRESS">En progreso</option>
      <option value="DONE">Completada</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="priority">Prioridad:</label>
    <select [value]="selectedPriority() || ''" id="priority" (change)="onPriorityChange($event)">
      <option value="">Todas</option>
      <option value="LOW">Baja</option>
      <option value="MEDIUM">Media</option>
      <option value="HIGH">Alta</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Mostrar:</label>
    <select [value]="pageSize()" (change)="onPageSizeChange($event)">
      <option value="6">6</option>
      <option value="12">12</option>
      <option value="24">24</option>
    </select>
  </div>

  <div class="filter-group">
    <button class="btn-reset" (click)="reset.emit()" title="Limpiar filtros">
      Reestrablecer Filtros
    </button>
  </div>

  <div class="view-toggle-group">
    <button type="button" [class.active]="!showDeleted()" (click)="viewToggled.emit(false)">
      Tareas Activas
    </button>
    <button
      type="button"
      [class.active]="showDeleted()"
      (click)="viewToggled.emit(true)"
      class="btn-trash"
    >
      Papelera
    </button>
  </div>
</section>
