<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>
        {{ isReadOnly() ? 'Tarea Eliminada' : taskToEdit() ? 'Editar Tarea' : 'Nueva Tarea' }}
      </h2>
      <button class="btn-close" (click)="close.emit()" title="Cerrar">&times;</button>
    </header>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Título *</label>
        <input type="text" formControlName="title" placeholder="Ej. Comprar comida" />
        @let titleError = getError('title');
        @if (titleError) {
          <small class="error"> {{ titleError }} </small>
        }
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea
          formControlName="description"
          rows="3"
          maxlength="500"
          placeholder="Detalles de la tarea..."
        ></textarea>
      </div>

      <div class="form-group">
        <label>Fecha de Vencimiento</label>
        <input type="date" formControlName="dueDate" class="form-control" />
        <small class="helper-text">Indica cuándo debe estar terminada esta tarea.</small>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prioridad *</label>
          <select formControlName="priority">
            <option value="LOW">Baja</option>
            <option value="MEDIUM">Media</option>
            <option value="HIGH">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado *</label>
          <select formControlName="status">
            <option value="TODO">Pendiente</option>
            <option value="IN_PROGRESS">En Progreso</option>
            <option value="DONE">Completada</option>
          </select>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="alert-error">
          {{ errorMessage() }}
        </div>
      }

      <footer class="modal-footer">
        <button
          type="button"
          class="btn-secondary"
          (click)="close.emit()"
          [disabled]="loader.isLoading()"
        >
          {{ isReadOnly() ? 'Cerrar' : 'Cancelar' }}
        </button>
        @if (isReadOnly()) {
          <button
            type="button"
            class="btn-restore"
            (click)="onRestore()"
            [disabled]="loader.isLoading()"
          >
            {{ loader.isLoading() ? 'Restaurando...' : 'Restaurar Tarea' }}
          </button>
        } @else {
          <button
            type="submit"
            class="btn-primary"
            [disabled]="taskForm.invalid || loader.isLoading()"
          >
            {{
              loader.isLoading()
                ? 'Procesando...'
                : taskToEdit()
                  ? 'Guardar Cambios'
                  : 'Crear Tarea'
            }}
          </button>
        }
      </footer>
    </form>
  </div>
</div>
