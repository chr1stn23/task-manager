<div class="users-container">
  <header class="users-header">
    <h1>Gestión de Usuarios</h1>
    <p>Administra y gestiona los usuarios del sistema.</p>
  </header>
  <app-admin-user-filters
    [searchUserTerm]="searchUserTerm()"
    [searchEmailTerm]="searchEmailTerm()"
    [showDisabledUsers]="showDisabled()"
    [pageSize]="pageSize()"
    (searchUserChange)="onSearchUser($event)"
    (searchEmailChange)="onSearchEmail($event)"
    (toggleDisabled)="toggleDisabled($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (reset)="resetFilters()"
  ></app-admin-user-filters>
  @if (isLoading()) {
    <div class="loading">Cargando los usuarios...</div>
  } @else {
    <app-admin-user-table
      [users]="users()"
      [currentSort]="sort()"
      (userDetail)="onUserDetail($event)"
      (toggleStatus)="onToggleStatus($event)"
      (sortChange)="onSort($event)"
    />
    @if (pageData()) {
      <app-pagination [page]="pageData()!" (pageChange)="changePage($event)" />
    }
  }
</div>

@if (showConfirm()) {
  <app-confirm-modal
    [modalTitle]="userToToggle()?.enabled ? 'Desactivar usuario' : 'Activar usuario'"
    [message]="
      userToToggle()?.enabled
        ? '¿Estás seguro de activar este usuario?'
        : '¿Estás seguro de desactivar este usuario?'
    "
    [confirmText]="userToToggle()?.enabled ? 'Desactivar' : 'Activar'"
    [variant]="userToToggle()?.enabled ? 'danger' : 'success'"
    (confirm)="confirmToggle()"
    (cancel)="closeConfirm()"
  />
}
