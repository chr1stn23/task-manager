<nav class="navbar">
  <div class="brand">
    <a routerLink="/tasks">Task Manager</a>
  </div>

  <ul class="nav-links">
    @if (authService.currentUserToken()) {
      <li><a routerLink="/tasks" routerLinkActive="active">Mis tareas</a></li>

      @if (authService.isAdmin()) {
        <li><a routerLink="/admin" routerLinkActive="active">Panel Admin</a></li>
      }

      <li class="user-dropdown">
        <button class="dropdown-trigger" (click)="toggleMenu()">
          <span
            >Hola, <strong>{{ authService.currentUser()?.name }}</strong></span
          >
          <span class="arrow" [class.open]="isMenuOpen()">▼</span>
        </button>

        @if (isMenuOpen()) {
          <div class="dropdown-menu">
            <a routerLink="/profile" class="dropdown-item">
              <span class="icon">👤</span> Mi Cuenta
            </a>
            <div class="divider"></div>
            <button class="dropdown-item logout" (click)="onLogout()">
              <span class="icon">🚪</span> Cerrar Sesión
            </button>
          </div>
        }
      </li>
    } @else {
      <li><a routerLink="/login">Iniciar Sesión</a></li>
      <li><a routerLink="/register">Registrarse</a></li>
    }
  </ul>
</nav>
